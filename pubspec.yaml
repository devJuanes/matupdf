name: matupdf
description: "MatuPDF — Merge PDF files instantly. Premium SaaS experience."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  file_picker: ^8.1.7
  desktop_drop: ^0.5.0
  provider: ^6.1.2
  go_router: ^15.1.2
  pdf_combiner: ^4.3.8
  path_provider: ^2.1.5
  web: ^1.1.1
  image: ^4.5.4
  file_magic_number: ^1.4.2
  http: ^1.2.2
  shared_preferences: ^2.3.3
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
